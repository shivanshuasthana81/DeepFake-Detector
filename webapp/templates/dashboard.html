<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">DeepFake Detector</div>

    <div class="nav-links">
        <a href="/about">About</a>
        <a href="/logout" class="btn-danger">Logout</a>
    </div>
</nav>

<!-- MAIN CONTAINER -->
<div class="container">

    <h1>Welcome, {{ username }} 👋</h1>

    <div class="card">

        <h2>Upload Video</h2>

        <!-- FORM -->
        <form method="POST" enctype="multipart/form-data" onsubmit="showLoader()">

            <input type="file" name="video" id="videoInput" accept="video/*" required>

            <!-- VIDEO PREVIEW -->
            <video id="preview" controls></video>

            <button type="submit" class="btn-primary">Analyze Video</button>

        </form>

        <!-- LOADER -->
        <div id="loader">
            <div class="spinner"></div>
            <p>Processing video... please wait</p>
        </div>

    </div>

</div>

<!-- SCRIPT -->
<script>
document.getElementById("videoInput").onchange = function (event) {
    const file = event.target.files[0];
    if (file) {
        const url = URL.createObjectURL(file);
        const video = document.getElementById("preview");
        video.src = url;
        video.style.display = "block";
    }
};

function showLoader() {
    document.getElementById("loader").style.display = "flex";
}
</script>

</body>
</html>
