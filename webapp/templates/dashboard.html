<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        /* File info display */
        .file-info {
            margin-top: 10px;
            padding: 10px;
            background: #f1f1f1;
            border-radius: 6px;
            font-size: 14px;
            display: none;
        }

        /* Loader */
        #loader {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">DeepFake Detector</div>

    <div class="nav-links">
        <a href="/about">About</a>
        <a href="/logout" class="btn-danger">Logout</a>
    </div>
</nav>

<!-- MAIN CONTAINER -->
<div class="container">

    <h1>Welcome, {{ username }} 👋</h1>

    <div class="card">

        <h2>Upload Video</h2>

        <!-- ✅ FIXED FORM -->
        <form method="POST" enctype="multipart/form-data">

            <!-- FILE INPUT -->
            <input type="file" name="video" id="videoInput" accept="video/*" required>

            <!-- FILE INFO (LIKE HF) -->
            <div id="fileInfo" class="file-info"></div>

            <button type="submit" class="btn-primary" onclick="showLoader()">Analyze Video</button>

        </form>

        <!-- LOADER -->
        <div id="loader">
            <div class="spinner"></div>
            <p>Processing video... please wait</p>
        </div>

    </div>

</div>

<!-- SCRIPT -->
<script>
const input = document.getElementById("videoInput");
const fileInfo = document.getElementById("fileInfo");

input.onchange = function () {
    const file = this.files[0];

    if (file) {
        const sizeMB = (file.size / (1024 * 1024)).toFixed(2);

        fileInfo.style.display = "block";
        fileInfo.innerHTML = `
            📁 <strong>${file.name}</strong><br>
            📦 Size: ${sizeMB} MB
        `;
    }
};

// ✅ FIXED LOADER (does NOT block form submit)
function showLoader() {
    setTimeout(() => {
        document.getElementById("loader").style.display = "flex";
    }, 100);
}
</script>

</body>
</html>
