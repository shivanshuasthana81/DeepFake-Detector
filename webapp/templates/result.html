<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">DeepFake Detector</div>

    <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/logout" class="btn-danger">Logout</a>
    </div>
</nav>

<!-- MAIN -->
<div class="container">

    <div class="card">

        <h1>Detection Result</h1>

        <!-- RESULT LABEL -->
        {% if label == "REAL" %}
            <h2 class="result real">REAL ✅</h2>
        {% else %}
            <h2 class="result fake">FAKE ❌</h2>
        {% endif %}

        <!-- CONFIDENCE -->
        <p class="confidence-text">Confidence: {{ confidence }}%</p>

        <!-- PROGRESS BAR -->
        <div class="progress-container">
            <div class="progress-bar 
                {% if label == 'REAL' %}real-bar{% else %}fake-bar{% endif %}" 
                style="width: {{ confidence }}%;">
                {{ confidence }}%
            </div>
        </div>

        <!-- ACTION -->
        <a href="/dashboard" class="btn-primary">Analyze Another Video</a>

    </div>

</div>

</body>
</html>
